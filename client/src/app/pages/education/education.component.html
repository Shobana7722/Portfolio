<div class="page-container animate-fade-in">
  
  <div class="education-layout">
    <!-- Education Timeline -->
    <div class="timeline-section">
      <div class="section-header">
        <h2 class="numbered-heading">Education</h2>
        <div class="section-line"></div>
      </div>
      
      <div class="timeline">
        <div class="timeline-item" *ngFor="let edu of educations">
          <div class="timeline-dot"></div>
          <div class="timeline-content">
            <h3 class="degree">{{ edu.degree }}</h3>
            <h4 class="institution">{{ edu.institution }}</h4>
            <span class="period">{{ edu.period }}</span>
            <p class="description">{{ edu.description }}</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Certifications -->
    <div class="certifications-section">
      <div class="section-header">
        <h2 class="numbered-heading">Certifications</h2>
        <div class="section-line"></div>
      </div>

      <div class="cert-grid">
        <div class="cert-card" *ngFor="let cert of certifications">
          <div class="cert-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
          </div>
          <div class="cert-info">
            <h4 class="cert-name">{{ cert.name }}</h4>
            <p class="cert-issuer">{{ cert.issuer }}</p>
            <span class="cert-year">{{ cert.year }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
